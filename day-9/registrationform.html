<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="result.css">

</head>

<body>

<div class="main">

    <div class="blue"></div>

    <div class="form">

        <h2>Registration Form</h2>
        <form action = "registrationform.php" method="post" class = " form" enctype = "multipart/form-data">

                
                    <label for="Photo">Upload Photo</label>
                    <input
                    type="file"
                    id="Photo"
                    name="Photo"
                    accept="image/*"
                    required>
            
                <label>Full Name</label>
                <input type="text" name= "Name" placeholder="Enter full name" required>


                <label>Email Address</label>
                <input type="email" name="Email" placeholder="Enter email address"  required>

                <label for="Branch">Branch</label>

                <select name="Branch" id="Branch" required>
                    <option value="">-- Select Branch --</option>
                    <option value="Computer Science">CS</option>
                    <option value="Information Technology">IT</option>
                    <option value="Electronics and Communication">ECE</option>
                    <option value="Electrical Engineering">EE</option>
                    <option value="Mechanical Engineering">ME</option>
                    <option value="Civil Engineering">CE</option>
                    <option value="Data Science Engineering">DS</option>
                    <option value="Artificial Intelligent Engineering">AI</option>
                </select>
           


                <div class="two">

                    <div>
                        <label>Phone Number</label>
                    

                            <input
                                type="text"
                                name="PhoneNumber"
                                pattern="[0-9]{10}"
                                placeholder = "Enter you Phone Number"
                                title="Phone number must contain exactly 10 digits"
                                required>
                    </div>

                    <div>
                        <label>Birth Date</label>
                        <input type="date" name ="BirthDate" required>
                    </div>

                </div>


                <label>Gender</label>

                <div class="gender">
                    <input type="radio" name="Gender" value="Male" required> Male
                    <input type="radio" name="Gender" value="Female"> Female
                    <input type="radio" name="Gender" value="Prefer not to say"> Prefer not to say
                </div>



                <label>Address</label>

                <input type="text" name = "Address1" placeholder="Enter street address" required>

                <input type="text" name = "Address2" placeholder="Enter street address line 2" required>


                <div class="two">

                    <input type="text" name="Country" placeholder="Enter your country" required>

                    <input type="text" name = "City" placeholder="Enter your city" required>

                </div>


                <div class="two">

                    <input type="text" name = "Region" placeholder="Enter your region" required>

                    <input type="text"  name = "Code" placeholder="Enter postal code" required>

                    <a href="submitted.html">
                        <button type="Submit">Submit</button>
                    </a>

                </div>
            
           

        </form>


    </div>

</div>


</body>
</html>
