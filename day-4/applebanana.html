<html>
<body>

<p>Apple : <span id="apple">0</span></p>
<p>Banana : <span id="banana">0</span></p>

<img src="https://png.pngtree.com/png-clipart/20231005/original/pngtree-a-red-apple-on-transparent-background-png-image_13279272.png" width="250" onclick="clickImage('apple',this)">
<img src="https://img.freepik.com/premium-photo/close-up-photo-fresh-fruit-banana_983093-20.jpg?w=2000" width="250" onclick="clickImage('banana',this)">

<script>

let apple = 0;
let banana = 0;

document.querySelectorAll("img").forEach(img => {
    img.style.position = "absolute";
    img.style.left = Math.random() * (window.innerWidth - 100) + "px";
    img.style.top = Math.random() * (window.innerHeight - 120) + "px";
});

function clickImage(type, img) {

    if(type == "apple") {
        document.getElementById("apple").innerText = ++apple;
    }
    else {
        document.getElementById("banana").innerText = ++banana;
    }

    img.style.left = Math.random() * (window.innerWidth - 100) + "px";
    img.style.top = Math.random() * (window.innerHeight - 120) + "px";
}

</script>

</body>
</html>
