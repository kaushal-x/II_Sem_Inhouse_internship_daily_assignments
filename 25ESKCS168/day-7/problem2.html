<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelling book your ticket</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
        background-size: cover;
        background-position: center;
    }

    form{
        width: 400px;
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.2);
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        color: white;
    }

    form::before{
        content: "✈ Travel Ticket Booking";
        display: block;
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 25px;
        color: #ffd166;
    }

    div{
        margin-bottom: 18px;
    }

    label{
        display: block;
        margin-bottom: 8px;
        font-size: 16px;
        font-weight: bold;
        color: #fff;
        text-transform: capitalize;
    }

    input,
    textarea{
        width: 100%;
        padding: 12px;
        border: none;
        outline: none;
        border-radius: 10px;
        background: rgba(255,255,255,0.2);
        color: white;
        font-size: 15px;
        transition: 0.3s;
    }

    input::placeholder,
    textarea::placeholder{
        color: #ddd;
    }

    input:focus,
    textarea:focus{
        background: rgba(255,255,255,0.3);
        border: 1px solid #ffd166;
        transform: scale(1.02);
    }

    textarea{
        resize: none;
        height: 90px;
    }

    input[type="submit"]{
        background: linear-gradient(45deg, #ff9f1c, #ffbf69);
        color: black;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    input[type="submit"]:hover{
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(255,191,105,0.5);
    }
</style>
<body>
    <form action="registration.php" method="post" class="form">
        <div>
            <label for="name">name</label>
            <input type="text" name="name" id="name" placeholder="enter your name">
        </div>
        <div>
            <label for="age">age</label>
            <input type="number" name="age" id="age" placeholder="enter your age">
        </div>
        <div>
            <label for="phone">phone</label>
            <input type="tel" name="phoneNumber" ="phone" placeholder="enter your phone number">
        </div>
        <div>
            <label for="email"></label>email</label>
            <input type="email" name="email" id="email" placeholder="enter your email">
        </div>
        <div>
            <label for="address">address</label>
            <textarea name="address" name="AddressLine1" id="address" placeholder="enter your address"></textarea>
        </div>
        <div>
            <!-- submit -->
            <input type="submit" value="submit">
        </div>
        <div>
            <form action="" method="POST" enctype="multipart/form-data">
                <input type="file" name="myfile" accept="image/*" required>
                <button type="submit"Upload0></button>
            </form>
        </div>
        
    </form>
</body>
</html>
