<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form</title>
    <link rel="stylesheet" href="style.css" >

</head>

<body>
    <div class="head">
    <header>
        <h1>SKIT COLLEGE</h1>
        <h3>Admission Form</h3>
    </header>
    </div>
    <div class="container">
        <label for="101">Username</label>
        <input type="text" name="username" placeholder="Enter your name" id="101">

         <label for="102">Email</label>
         <input type="email" name="Email" placeholder="Enter your email here" id="102">

         <label for="103">Phone number</label>
         <input type="number" name="Number" placeholder="Enter your phone no" id="103">

         <label for="104">DOB</label>
         <input type="date" name="DOb" id="104">
<div class="gender">
        <label for="105">Male</label>

         <input 
         type="radio" name="gender" value="male" id="105">

         <label for="106">Female</label>
         
                  <input 
         type="radio" name="gender" value="female" id="105">
         </div>

         <select name="course">
            <option value="Btech">Btech</option>
             <option value="BSC">BSC</option>
        <option value="LLB">LLB</option>

         </select>

         <textarea placeholder="Enter your address here">Address</textarea>

         <label for="photo" >Photo</label>
         <input type="file" name="photo" id="photo" >

         <button type="submit">Submit here!</button>

         


    </div>



    
</body>
</html>
